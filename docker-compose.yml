services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dispatch_todo_app}
      MYSQL_USER: ${MYSQL_USER:-dnl}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/dispatch_todo_app.sql:/docker-entrypoint-initdb.d/001-dispatch_todo_app.sql:ro
      - ./db/drivers_documents_migration.sql:/docker-entrypoint-initdb.d/010-drivers_documents_migration.sql:ro
      - ./db/drivers_status_migration.sql:/docker-entrypoint-initdb.d/011-drivers_status_migration.sql:ro
      - ./db/loads_enhancement_migration.sql:/docker-entrypoint-initdb.d/012-loads_enhancement_migration.sql:ro
      - ./db/loads_documents_migration.sql:/docker-entrypoint-initdb.d/013-loads_documents_migration.sql:ro
      - ./db/schema_upgrade_weekly_settlement.sql:/docker-entrypoint-initdb.d/014-schema_upgrade_weekly_settlement.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./vibe code dnl
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DB_HOST: db
      DB_USER: ${MYSQL_USER:-dnl}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE:-dispatch_todo_app}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SCREENSHOT_ALLOWED_HOSTS: ${SCREENSHOT_ALLOWED_HOSTS}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_DISABLE_SANDBOX: "1"
    volumes:
      - uploads_data:/app/uploads
      - ./backups:/app/backups
    expose:
      - "5000"

  frontend:
    build:
      context: ./front_end vibecode dnl/dnl_front_end
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
    expose:
      - "3000"

volumes:
  mysql_data:
  uploads_data:
